<!-- auth.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Cart - Login</title>
  <link rel="stylesheet" href="end.css" />
</head>
<body>
    <!-- Add at the top of <body> -->
<header>
    <img src="https://images.shiksha.com/mediadata/images/1570441904phpGyuPi8.jpeg" alt="NIT Delhi Logo" class="logo">
    <h1>CampusCart:Spend Less Share More</h1>
  </header>
  
  <div id="authSection">
    <h2>Login / Register</h2>
    <input type="email" id="authEmail" placeholder="NIT Delhi Email" required />
    <input type="password" id="authPassword" placeholder="Password" required />
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <button id="resetPasswordBtn">Forgot Password?</button>
    <button id="googleLoginBtn">Login with Google</button>
    <p id="feedbackMessage"></p>
  </div>

  <script type="module" src="auth.js" defer></script>
</body>
</html>

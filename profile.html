<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile</title>
  <link rel="stylesheet" href="end.css" />
</head>
<body>
  <!-- Profile Section -->
  <header>
    <img src="https://images.shiksha.com/mediadata/images/1570441904phpGyuPi8.jpeg" alt="NIT Delhi Logo" class="nit-logo" />
    <h1>USER PROFILE</h1>
  </header>
  

    <div class="profile-info">
      <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
      <p><strong>Branch:</strong> <span id="userBranch">Loading...</span></p>
      <p><strong>Year:</strong> <span id="userYear">Loading...</span></p>
      <p><strong>Hostel:</strong> <span id="userHostel">Loading...</span></p>
      <p><strong>Contact:</strong> <span id="userContact">Loading...</span></p>
      <p><strong>UPI ID:</strong> <span id="userUpi">Loading...</span></p>

      <button id="editProfileBtn">Edit Profile</button>
    </div>

    <section id="itemsSection">
      <h3>My Items</h3>
      <div id="myItemsContainer"></div>
    </section>

    <section id="requestsSection">
      <h3>My Requests</h3>
      <div id="myRequestsContainer"></div>
    </section>

    <section id="responsesSection">
      <h3>Responses to My Requests</h3>
      <div id="responsesContainer"></div>
    </section>

    <button id="logoutButton">Logout</button>

    <button id="backToMainBtn">Back to Campus Cart</button>

  </div>

  <script type="module">
    import {
      auth, db, doc, getDoc,
      collection, query, where, getDocs,
      deleteDoc, signOut, onAuthStateChanged
    } from './firebase.js';

    const userNameElement = document.getElementById('userName');
    const userBranchElement = document.getElementById('userBranch');
    const userYearElement = document.getElementById('userYear');
    const userHostelElement = document.getElementById('userHostel');
    const userContactElement = document.getElementById('userContact');
    const userUpiElement = document.getElementById('userUpi');
    const myItemsContainer = document.getElementById('myItemsContainer');
    const myRequestsContainer = document.getElementById('myRequestsContainer');
    const responsesContainer = document.getElementById('responsesContainer');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutButton = document.getElementById('logoutButton');
    const backToMainBtn = document.getElementById('backToMainBtn');
    const itemsSection = document.getElementById('itemsSection');
    const requestsSection = document.getElementById('requestsSection');
    const responsesSection = document.getElementById('responsesSection');

    async function fetchUserProfile(uid) {
      const profileSnap = await getDoc(doc(db, 'users', uid));
      if (!profileSnap.exists()) {
        alert("User profile not found.");
        return;
      }
      const userProfile = profileSnap.data();
      userNameElement.textContent = userProfile.name || "Not Provided";
      userBranchElement.textContent = userProfile.branch || "Not Provided";
      userYearElement.textContent = userProfile.year || "Not Provided";
      userHostelElement.textContent = userProfile.hostel || "Not Provided";
      userContactElement.textContent = userProfile.contact || "Not Provided";
      userUpiElement.textContent = userProfile.upi || "Not Provided";
    }

    async function fetchUserItems(uid) {
      const q = query(collection(db, "items"), where("userID", "==", uid));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        myItemsContainer.innerHTML = "<p>No items listed.</p>";
        return;
      }

      querySnapshot.forEach((docSnap) => {
        const item = docSnap.data();
        const itemDiv = document.createElement("div");
        itemDiv.innerHTML = `
          <h4>${item.itemName}</h4>
          <p>₹${item.itemPrice}</p>
          <p>${item.itemDescription}</p>
          <hr />
        `;
        myItemsContainer.appendChild(itemDiv);
      });
    }

    async function fetchUserRequests(uid) {
      const q = query(collection(db, "requests"), where("userID", "==", uid));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        myRequestsContainer.innerHTML = "<p>No requests made.</p>";
        return;
      }

      querySnapshot.forEach((docSnap) => {
        const req = docSnap.data();
        const requestDiv = document.createElement("div");
        
        myRequestsContainer.appendChild(requestDiv); 
      });

      document.querySelectorAll('.deleteRequestBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          if (confirm("Are you sure you want to delete this request?")) {
            await deleteDoc(doc(db, "requests", id));
            location.reload();
          }
        });
      });

      document.querySelectorAll('.editRequestBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          window.location.href = 'edit-request.html?requestId=${id}';
        });
      });
    }

    async function fetchResponsesForUser(requesterID) {
      const q = query(collection(db, "responses"), where("requesterID", "==", requesterID));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        responsesContainer.innerHTML = "<p>No responses yet.</p>";
        return;
      }

      for (const docSnap of querySnapshot.docs) {
        const response = docSnap.data();
        try {
          const responderSnap = await getDoc(doc(db, "users", response.responderID));
          if (responderSnap.exists()) {
            const responder = responderSnap.data();
            const responderCard = document.createElement("div");
            responderCard.classList.add("responder-card");

            responderCard.innerHTML = `
              <p><strong>${responder.name}</strong> says: "I have it!"</p>
              <p>Contact: ${responder.contact}</p>
              <button onclick="window.location.href='profile.html?userId=${response.responderID}'">View Profile</button>
              <hr/>
            `;

            responsesContainer.appendChild(responderCard);
          }
        } catch (error) {
          console.error("Error loading responder info:", error);
        }
      }
    }

    onAuthStateChanged(auth, async (currentUser) => {
      if (!currentUser || !currentUser.emailVerified) {
        window.location.href = "auth.html";
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const viewedUserId = urlParams.get("userId");
      const uidToShow = viewedUserId || currentUser.uid;

      await fetchUserProfile(uidToShow);

      const isViewingOwnProfile = !viewedUserId || viewedUserId === currentUser.uid;

      if (isViewingOwnProfile) {
        await fetchUserItems(uidToShow);
        await fetchUserRequests(uidToShow);
        await fetchResponsesForUser(uidToShow);
      } else {
        itemsSection.style.display = 'none';
        requestsSection.style.display = 'none';
        responsesSection.style.display = 'none';
        editProfileBtn.style.display = "none";
        logoutButton.style.display = "none";
      }

      editProfileBtn.addEventListener("click", () => {
        window.location.href = "profile-setup.html";
      });

      logoutButton.addEventListener("click", async () => {
        try {
          await signOut(auth);
          window.location.href = "auth.html";
        } catch (error) {
          console.error("Logout failed:", error);
          alert("Failed to log out. Please try again.");
        }
      });

      backToMainBtn.addEventListener("click", () => {
        window.location.href = "end.html";
      });
    });
  </script>
</body>
</html>

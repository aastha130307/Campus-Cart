<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NIT Delhi Hostel Marketplace</title>
  <link rel="stylesheet" href="end.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
  <!-- Main Website Content -->
  <div id="mainContent" style="display: none;">
    <!-- Header Section -->
    <header>
      <h1>CampusCart:Spend Less Share More</h1>
      <img src="https://images.shiksha.com/mediadata/images/1570441904phpGyuPi8.jpeg" alt="NIT Delhi Logo" class="logo" />
    </header>

    <!-- Logout Button at Top Right -->


    <!-- Banner Images -->
    <div id="nitImages">
      <img src="https://zettainstitute.com/wp-content/uploads/2023/11/National-Institutes-of-Technology-NIT.webp" alt="NIT Delhi Campus 1">
      <img src="https://th.bing.com/th/id/OIP.ZWiWN7KhTzoPeBPgQmQrpQHaE8?rs=1&pid=ImgDetMain" alt="NIT Delhi Campus 2">
      <img src="https://www.ic2sdt.com/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fnitd_acad.5f53daf4.jpg&w=3840&q=75" alt="Hostel Life">
    </div>

    <!-- Navigation Buttons -->
    <nav class="sidebar-nav">
      <button id="sellBtn"><i class="fas fa-tag"></i> Sell Item</button>
      <button id="requestBtn"><i class="fas fa-hand-holding"></i> Request Item</button>
      <a href="browse.html"><button id="browseBtn"><i class="fas fa-search"></i> Browse</button></a>
      <button id="profileBtn"><i class="fas fa-user"></i> Profile</button>
      <div class="spacer"></div>
      <button id="logoutButton" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>
    
    
    <div class="quote-box">
      <i class="fas fa-quote-left quote-mark"></i>
      <p class="quote-text">Sharing isn’t just about giving, it’s about building a stronger community.</p>
      <i class="fas fa-quote-right quote-mark"></i>
    </div>
    
    <!-- Sell Section -->
    <section id="sellSection" class="section" style="display: none;">
      <h2>Upload Your Item for Sale</h2>
      <form id="sellForm">
        

        <label>Item Name <span class="required">*</span></label>
        <input type="text" id="itemName" required>

        <label>Description (optional)</label>
        <textarea id="itemDescription" rows="4" placeholder="Describe the item..."></textarea>

        <label>Price (optional)</label>
        <input type="number" id="itemPrice" placeholder="Enter price in ₹">

        <button type="submit">Upload Item</button>
      </form>
    </section>

    <!-- Request Section -->
    <section id="requestSection" class="section" style="display: none;">
      <h2>Request an Item</h2>
      <form id="requestForm">

        <label>Item Required <span class="required">*</span></label>
        <input type="text" id="requestedItem" required>

        <label>Purpose <span class="required">*</span></label>
        <select id="purpose" required>
          <option value="">Select purpose</option>
          <option>Buy</option>
          <option>Borrow</option>
        </select>

        <label>Duration (if borrow)</label>
        <input type="text" id="borrowDuration" placeholder="e.g. 2 days, 1 week">

        <label>Description (optional)</label>
        <textarea id="requestDescription" rows="4" placeholder="Describe your request..."></textarea>

        <label>Urgency Level</label>
        <select id="urgencyLevel">
          <option value="">Select urgency</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <button type="submit">Submit Request</button>
      </form>
    </section>

    <!-- Browse Section -->
    <section id="browseSection" class="section" style="display: none;">
      <h2>Items for Sale</h2>
      <div id="browseItemsContainer"></div>

      <h2>Requested Items</h2>
      <div id="browseRequestsContainer"></div>
    </section>
    <footer class="site-footer">
      <p>© 2025 CampusCart &nbsp; | &nbsp; Built with <i class="fas fa-heart"></i> by NIT Delhi Students</p>
    </footer>
    

    
  <!-- Script for Handling Authentication -->
  <script type="module">
    import { auth, signOut, onAuthStateChanged } from './firebase.js';

    // Handle logout
    document.getElementById("logoutButton").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "auth.html"; // Redirect to login page after logout
      }).catch((err) => {
        alert("Logout failed: " + err.message);
      });
    });

    // Wait for authentication state change
    onAuthStateChanged(auth, (user) => {
      if (user && user.emailVerified) {
        document.getElementById("mainContent").style.display = "block"; // Show main content if logged in
      } else {
        window.location.href = "auth.html"; // Redirect to auth page if not logged in
      }
    });
  </script>
  <script>
    document.getElementById('profileBtn').addEventListener('click', () => {
      window.location.href = 'profile.html';  // Redirect to the profile page
    });
  </script>
  
  <script type="module" src="end.js"></script>
  

</body>
</html>

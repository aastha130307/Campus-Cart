<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Items</title>
  <link rel="stylesheet" href="browse.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <header class="main-header">
        <img src="https://images.shiksha.com/mediadata/images/1570441904phpGyuPi8.jpeg" alt="NIT Delhi Logo" class="logo">
        <span class="site-title">CampusCart:Spend Less Share More</span>
      </header>
      
  <main>
    <section>
      <h2>Items for Sale</h2>
      <div class="search-bar-container">
        <input type="text" id="itemSearchInput" placeholder="Search items..." />
      </div>
      <div id="browseItemsContainer" class="item-list"></div>
    </section>

    <section>
      <h2>Requested Items</h2>
      <div class="search-bar-container">
        <input type="text" id="requestSearchInput" placeholder="Search requests..." />
      </div>
      <div id="browseRequestsContainer" class="request-list"></div>
    </section>
  </main>

  <script type="module" src="browse.js"></script>
</body>
</html>
